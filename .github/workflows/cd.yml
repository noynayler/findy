# CD: build image, push to GHCR, deploy to Kubernetes.
# Runs on push to main (image :main + :latest) and on tags v* (e.g. v1.0.0).
# Concurrency ensures only one deployment runs at a time.
name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: cd-findy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/findy:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/findy:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - name: Update deployment image
        run: |
          kubectl set image deployment/findy findy=ghcr.io/${{ github.repository_owner }}/findy:${{ github.ref_name }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/findy --timeout=120s
