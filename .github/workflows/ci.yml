# CI: lint, type-check, test, and validate multi-stage Docker on every push / PR.
# Does not push images or deploy.
name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Lint, test, typecheck, Docker validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Ruff lint (backend)
        run: ruff check backend/ --output-format=github

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check (tsc --noEmit)
        working-directory: frontend
        run: npm run typecheck

      - name: Vite production build
        working-directory: frontend
        run: npx vite build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate multi-stage Docker image (load only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: findy-ci:validate
          cache-from: type=gha
          cache-to: type=gha,mode=max
