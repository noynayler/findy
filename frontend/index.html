<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Findy - Israeli Tech Jobs</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Findy</h1>
            <p class="subtitle">Find tech jobs in Israel - Last 7 days only</p>
        </header>

        <div class="resume-section">
            <div class="form-group">
                <label for="resume">Upload Resume (PDF) - Optional:</label>
                <input type="file" id="resume" name="resume" accept=".pdf" class="input-field file-input">
                <button type="button" id="uploadResumeBtn" class="upload-button">Upload Resume</button>
                <span id="resumeStatus" class="resume-status"></span>
            </div>
        </div>

        <div class="search-section">
            <div class="form-group">
                <label for="title">Job Title (optional):</label>
                <input type="text" id="title" name="title" placeholder="e.g., devops, backend, frontend" class="input-field">
            </div>
            <div class="form-group">
                <label for="seniority">Seniority Level:</label>
                <select id="seniority" name="seniority" class="input-field">
                    <option value="">Any</option>
                    <option value="intern">Intern</option>
                    <option value="entry-level">Entry Level</option>
                    <option value="junior">Junior</option>
                    <option value="mid">Mid-Level</option>
                    <option value="senior">Senior</option>
                    <option value="lead">Lead</option>
                    <option value="manager">Manager</option>
                </select>
            </div>
            <button type="button" id="searchBtn" class="search-button">Search Jobs</button>
        </div>

        <div id="loading" class="loading hidden">Loading jobs...</div>
        <div id="error" class="error hidden"></div>

        <div id="totalJobsSection" class="total-jobs-section hidden">
            <h2>Total Jobs Available: <span id="totalJobCount">0</span></h2>
            <p id="filterNote" class="filter-note"></p>
        </div>

        <div id="resultsSection" class="results-section">
            <h2>Results: <span id="jobCount">0</span> jobs</h2>
            <div id="jobsList" class="jobs-list"></div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
