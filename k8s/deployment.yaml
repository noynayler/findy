apiVersion: apps/v1
kind: Deployment
metadata:
  name: findy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: findy
  template:
    metadata:
      labels:
        app: findy
    spec:
      containers:
        - name: findy
          image: noya39/findy:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000

          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10