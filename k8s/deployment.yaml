apiVersion: apps/v1
kind: Deployment
metadata:
  name: findy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: findy
  template:
    metadata:
      labels:
        app: findy
    spec:
      containers:
        - name: findy
          image: noya39/findy:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: data
              mountPath: /app/data
          env:
            - name: FLASK_DEBUG
              value: "0"

          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}